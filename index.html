<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Clone</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- LEFT SIDEBAR -->

    <aside class="sidebar">

        <i class="fa-brands fa-x-twitter logo"></i>

        <a href="#"><i class="fa-solid fa-house"></i> Home</a>

        <a href="#"><i class="fa-solid fa-magnifying-glass"></i> Explore</a>

        <a href="#"><i class="fa-regular fa-bell"></i> Notifications</a>

        <a href="#"><i class="fa-regular fa-envelope"></i> Messages</a>

        <a href="#"><i class="fa-regular fa-user"></i> Profile</a>

        <button>Post</button>

    </aside>


    <!-- FEED -->

    <main class="feed">

        <div class="feed-header">
            <h2>Home</h2>
        </div>

        <div class="tweet-box">

            <img src="https://i.pravatar.cc/45">

            <input
            type="text"
            placeholder="What's happening?">

        </div>

        <div class="post">

            <img src="https://i.pravatar.cc/45?img=5">

            <div class="post-content">

                <h3>Borg
                    <span>@BorgCrypto · 9h</span>
                </h3>

                <p>
                    $1,000 for 10 people who predicts exact score.
                </p>

                <img
                src="https://picsum.photos/600/320">

            </div>

        </div>

    </main>


    <!-- RIGHT SIDEBAR -->

    <aside class="right">

        <input
        type="text"
        placeholder="Search">

        <div class="card">

            <h3>Subscribe to Premium</h3>

            <p>
                Get rid of ads and unlock more features.
            </p>

            <button>Subscribe</button>

        </div>

        <div class="card">

            <h3>Today's News</h3>

            <p>Users celebrate Independence Day</p>

            <p>Prince Harry visits London</p>

            <p>Beşiktaş bid for Trossard</p>

        </div>

    </aside>

</div>

</body>
</html>
